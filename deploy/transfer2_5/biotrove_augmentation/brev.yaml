# Brev Launchable — BioTrove Moth Augmentation with Cosmos Transfer 2.5
#
# One-click GPU environment for:
#   Domain transfer pipeline for BioTrove moth dataset using edge-based control
#   Converts lab-style moth images to photorealistic agricultural scenes
#
# Hardware: 1x A100-80GB or H100-80GB (80 GB VRAM required)
# Driver:   >= 570 (CUDA 12.8 support required)
# Runtime:  ~30-45 min setup on first launch (model weights + FiftyOne dataset download)

name: cosmos-transfer25-biotrove-augmentation
description: >
  Domain transfer pipeline for the BioTrove moth dataset using Cosmos Transfer 2.5.
  Converts scarce lab-style moth images into photorealistic agricultural scenes via
  edge-based control, FiftyOne visualization, and CLIP similarity search.

instance:
  gpu: "A100-80GB"
  gpu_count: 1
  disk_gb: 200    # Transfer 2.5 weights + moth dataset + video outputs + edge maps

base_image: "nvcr.io/nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04"

setup: |
  #!/bin/bash
  set -e

  # System dependencies
  apt-get update -q
  apt-get install -y -q curl ffmpeg git git-lfs python3-pip libgl1 libglib2.0-0
  git lfs install

  # Install uv
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env

  # Clone cosmos-transfer2.5
  git clone https://github.com/nvidia-cosmos/cosmos-transfer2.5.git /workspace/cosmos-transfer2.5
  cd /workspace/cosmos-transfer2.5
  git lfs pull

  # Clone cosmos-cookbook (recipe assets)
  git clone https://github.com/nv-asotelo/cosmos-cookbook.git /workspace/cosmos-cookbook
  cd /workspace/cosmos-cookbook
  git checkout recipe/cosmos-reason2-deploy-overlay

  # Create Python environment (CUDA 12.8)
  cd /workspace/cosmos-transfer2.5
  uv sync --extra cu128
  source .venv/bin/activate

  # Install recipe-specific dependencies
  pip install -q fiftyone opencv-python umap-learn

  # Install JupyterLab
  pip install -U jupyterlab ipykernel
  python -m ipykernel install --user --name cosmos-transfer2-5 \
    --display-name "Python (cosmos-transfer2.5)"

  echo ""
  echo "=========================================="
  echo "Setup complete."
  echo ""
  echo "Next: authenticate with HuggingFace to download the model:"
  echo "  huggingface-cli login"
  echo ""
  echo "Then run the demo:"
  echo "  bash /workspace/cosmos-cookbook/deploy/transfer2_5/biotrove_augmentation/demo.sh"
  echo "=========================================="

ports:
  - 8888   # JupyterLab

launch: |
  cd /workspace/cosmos-transfer2.5
  source .venv/bin/activate
  jupyter lab \
    --ip=0.0.0.0 \
    --port=8888 \
    --no-browser \
    --allow-root \
    --NotebookApp.token='' \
    --NotebookApp.password=''

notes: |
  Before running the demo:

  1. Open a terminal in JupyterLab and authenticate with HuggingFace:
       huggingface-cli login
     (Required for Cosmos Transfer 2.5 model weights)

  2. The BioTrove moth dataset is public — no separate authentication needed.

  3. Run the demo script:
       bash /workspace/cosmos-cookbook/deploy/transfer2_5/biotrove_augmentation/demo.sh

  Output: Augmented agricultural moth scene videos + FiftyOne grouped dataset
          with original/edge/output slices for side-by-side comparison.

  Recipe: docs/recipes/inference/transfer2_5/biotrove_augmentation/inference.md
  FiftyOne Tutorial: https://docs.voxel51.com/tutorials/cosmos-transfer-integration.html
