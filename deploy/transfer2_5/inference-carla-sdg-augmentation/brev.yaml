# Brev Launchable — Sim2Real Augmentation with Cosmos Transfer 2.5
#
# One-click GPU environment for:
#   Simulator-to-real augmentation of synthetic driving videos
#   18 photorealistic augmentations (lighting, weather, road conditions)
#
# Hardware: 1x A100-80GB or H100-80GB (80 GB VRAM required)
# Driver:   >= 570 (CUDA 12.8 support required)
# Runtime:  ~25-35 min setup on first launch (model weights download)
# Data:     BYO — requires CARLA simulator or compatible synthetic driving video

name: cosmos-transfer25-carla-sdg-augmentation
description: >
  Simulator-to-real augmentation using Cosmos Transfer 2.5 for CARLA and compatible
  synthetic driving videos. Generates 18 photorealistic variations across lighting,
  weather, and road surface conditions while preserving ground-truth anomaly behaviors.

instance:
  gpu: "A100-80GB"
  gpu_count: 1
  disk_gb: 200    # Transfer 2.5 weights + input videos + 18 augmentation outputs

base_image: "nvcr.io/nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04"

setup: |
  #!/bin/bash
  set -e

  # System dependencies
  apt-get update -q
  apt-get install -y -q curl ffmpeg git git-lfs python3-pip
  git lfs install

  # Install uv
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env

  # Clone cosmos-transfer2.5
  git clone https://github.com/nvidia-cosmos/cosmos-transfer2.5.git /workspace/cosmos-transfer2.5
  cd /workspace/cosmos-transfer2.5
  git lfs pull

  # Clone cosmos-cookbook (recipe assets)
  git clone https://github.com/nv-asotelo/cosmos-cookbook.git /workspace/cosmos-cookbook
  cd /workspace/cosmos-cookbook
  git checkout recipe/cosmos-reason2-deploy-overlay

  # Create Python environment (CUDA 12.8)
  cd /workspace/cosmos-transfer2.5
  uv sync --extra cu128
  source .venv/bin/activate

  # Install JupyterLab
  pip install -U jupyterlab ipykernel
  python -m ipykernel install --user --name cosmos-transfer2-5 \
    --display-name "Python (cosmos-transfer2.5)"

  echo ""
  echo "=========================================="
  echo "Setup complete."
  echo ""
  echo "Next: authenticate with HuggingFace to download the model:"
  echo "  huggingface-cli login"
  echo ""
  echo "Upload your CARLA simulator video, then run the demo:"
  echo "  export BYO_VIDEO=/path/to/your/simulator_rgb_video.mp4"
  echo "  bash /workspace/cosmos-cookbook/deploy/transfer2_5/inference-carla-sdg-augmentation/demo.sh"
  echo "=========================================="

ports:
  - 8888   # JupyterLab

launch: |
  cd /workspace/cosmos-transfer2.5
  source .venv/bin/activate
  jupyter lab \
    --ip=0.0.0.0 \
    --port=8888 \
    --no-browser \
    --allow-root \
    --NotebookApp.token='' \
    --NotebookApp.password=''

notes: |
  Before running the demo:

  1. Open a terminal in JupyterLab and authenticate with HuggingFace:
       huggingface-cli login
     (Required for Cosmos Transfer 2.5 model weights)

  2. Upload your CARLA simulator RGB video (MP4) to the instance.
     Optionally upload matching depth/segmentation/edge maps for multi-control.

  3. Set the BYO_VIDEO variable and run the demo:
       export BYO_VIDEO=/path/to/your/simulator_rgb_video.mp4
       bash /workspace/cosmos-cookbook/deploy/transfer2_5/inference-carla-sdg-augmentation/demo.sh

  Output: Photorealistic augmented driving videos demonstrating edge-based sim-to-real.
          Results in /tmp/carla_sdg_output/ + timing JSON at /tmp/carla_sdg_results.json

  Recipe: docs/recipes/inference/transfer2_5/inference-carla-sdg-augmentation/inference.md
