# Brev Launchable — Style-Guided Video Generation with Cosmos Transfer 2.5
#
# One-click GPU environment for:
#   Style-guided video generation combining structural control + image reference
#   Apply any visual style (color palette, lighting, mood) to structured video
#
# Hardware: 1x A100-80GB or H100-80GB (80 GB VRAM required)
# Driver:   >= 570 (CUDA 12.8 support required)
# Runtime:  ~25-35 min setup on first launch (model weights download)
# Data:     BYO — requires a control video (edge/depth/seg) + style reference image

name: cosmos-transfer25-image-prompt
description: >
  Style-guided video generation using Cosmos Transfer 2.5 image prompt feature.
  Combines structural control (edge, depth, or segmentation) with a reference image
  to transfer visual style (color palette, lighting, mood) to generated video.

instance:
  gpu: "A100-80GB"
  gpu_count: 1
  disk_gb: 200    # Transfer 2.5 weights + input videos + styled output videos

base_image: "nvcr.io/nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04"

setup: |
  #!/bin/bash
  set -e

  # System dependencies
  apt-get update -q
  apt-get install -y -q curl ffmpeg git git-lfs python3-pip
  git lfs install

  # Install uv
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env

  # Clone cosmos-transfer2.5
  git clone https://github.com/nvidia-cosmos/cosmos-transfer2.5.git /workspace/cosmos-transfer2.5
  cd /workspace/cosmos-transfer2.5
  git lfs pull

  # Clone cosmos-cookbook (recipe assets)
  git clone https://github.com/nv-asotelo/cosmos-cookbook.git /workspace/cosmos-cookbook
  cd /workspace/cosmos-cookbook
  git checkout recipe/cosmos-reason2-deploy-overlay

  # Create Python environment (CUDA 12.8)
  cd /workspace/cosmos-transfer2.5
  uv sync --extra cu128
  source .venv/bin/activate

  # Install JupyterLab
  pip install -U jupyterlab ipykernel
  python -m ipykernel install --user --name cosmos-transfer2-5 \
    --display-name "Python (cosmos-transfer2.5)"

  echo ""
  echo "=========================================="
  echo "Setup complete."
  echo ""
  echo "Next: authenticate with HuggingFace to download the model:"
  echo "  huggingface-cli login"
  echo ""
  echo "Upload your control video + style reference image, then run:"
  echo "  export BYO_VIDEO=/path/to/control_video.mp4"
  echo "  export BYO_STYLE_IMAGE=/path/to/style_reference.jpg"
  echo "  bash /workspace/cosmos-cookbook/deploy/transfer2_5/inference-image-prompt/demo.sh"
  echo "=========================================="

ports:
  - 8888   # JupyterLab

launch: |
  cd /workspace/cosmos-transfer2.5
  source .venv/bin/activate
  jupyter lab \
    --ip=0.0.0.0 \
    --port=8888 \
    --no-browser \
    --allow-root \
    --NotebookApp.token='' \
    --NotebookApp.password=''

notes: |
  Before running the demo:

  1. Open a terminal in JupyterLab and authenticate with HuggingFace:
       huggingface-cli login
     (Required for Cosmos Transfer 2.5 model weights)

  2. Upload your control video (edge/depth/segmentation MP4) and style image (JPEG/PNG).
     Note: Blur control does NOT support image prompts — use edge, depth, or seg only.

  3. Set variables and run the demo:
       export BYO_VIDEO=/path/to/control_video.mp4
       export BYO_STYLE_IMAGE=/path/to/style_reference.jpg
       bash /workspace/cosmos-cookbook/deploy/transfer2_5/inference-image-prompt/demo.sh

  Output: Style-guided video with reference image's aesthetics applied to structured motion.
          Results in /tmp/image_prompt_output/ + timing JSON at /tmp/image_prompt_results.json

  Recipe: docs/recipes/inference/transfer2_5/inference-image-prompt/inference.md
