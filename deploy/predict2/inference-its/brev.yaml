# Brev Launchable — ITS Image Generation with Cosmos Predict 2
#
# One-click GPU environment for:
#   Synthetic ITS image generation via text-to-image (Cosmos Predict 2)
#   Diverse camera angles, weather, and traffic scenarios for AV training data
#
# Hardware: 1x A100-80GB or H100-80GB (80 GB VRAM recommended)
# Driver:   >= 570 (CUDA 12.8 support required)
# Runtime:  ~25-35 min setup on first launch (model weights download)

name: cosmos-predict2-inference-its
description: >
  Synthetic Intelligent Transportation System (ITS) image generation using
  Cosmos Predict 2 Text-to-Image. Generates diverse training images across
  camera viewpoints, weather conditions, and long-tail object classes (bicycles,
  pedestrians) to improve downstream RT-DETR object detection.

instance:
  gpu: "A100-80GB"
  gpu_count: 1
  disk_gb: 150    # Predict 2 weights + generated images (text-to-image, smaller than video)

base_image: "nvcr.io/nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04"

setup: |
  #!/bin/bash
  set -e

  # System dependencies
  apt-get update -q
  apt-get install -y -q curl ffmpeg git git-lfs python3-pip
  git lfs install

  # Install uv
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env

  # Clone cosmos-predict2
  git clone https://github.com/nvidia-cosmos/cosmos-predict2.git /workspace/cosmos-predict2
  cd /workspace/cosmos-predict2
  git lfs pull

  # Clone cosmos-cookbook (recipe assets)
  git clone https://github.com/nv-asotelo/cosmos-cookbook.git /workspace/cosmos-cookbook
  cd /workspace/cosmos-cookbook
  git checkout recipe/cosmos-reason2-deploy-overlay

  # Create Python environment (CUDA 12.8)
  cd /workspace/cosmos-predict2
  uv sync --extra cu128
  source .venv/bin/activate

  # Install JupyterLab
  pip install -U jupyterlab ipykernel
  python -m ipykernel install --user --name cosmos-predict2 \
    --display-name "Python (cosmos-predict2)"

  echo ""
  echo "=========================================="
  echo "Setup complete."
  echo ""
  echo "Next: authenticate with HuggingFace to download the model:"
  echo "  huggingface-cli login"
  echo ""
  echo "Then run the demo:"
  echo "  bash /workspace/cosmos-cookbook/deploy/predict2/inference-its/demo.sh"
  echo "=========================================="

ports:
  - 8888   # JupyterLab

launch: |
  cd /workspace/cosmos-predict2
  source .venv/bin/activate
  jupyter lab \
    --ip=0.0.0.0 \
    --port=8888 \
    --no-browser \
    --allow-root \
    --NotebookApp.token='' \
    --NotebookApp.password=''

notes: |
  Before running the demo:

  1. Open a terminal in JupyterLab and authenticate with HuggingFace:
       huggingface-cli login
     (Required for Cosmos Predict 2 model weights)

  2. Run the demo script (no input data required — prompts are hardcoded):
       bash /workspace/cosmos-cookbook/deploy/predict2/inference-its/demo.sh

  Output: 5 ITS images covering night/snow/fog/rain/clear conditions with varied
          camera angles and traffic objects. Results in /tmp/its_output/
          Timing metrics at /tmp/its_results.json

  Recipe: docs/recipes/inference/predict2/inference-its/inference.md
  Cosmos Predict 2 Text2Image docs: https://github.com/nvidia-cosmos/cosmos-predict2/blob/main/documentations/inference_text2image.md
